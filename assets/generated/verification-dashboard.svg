<svg xmlns="http://www.w3.org/2000/svg" width="850" height="300" viewBox="0 0 850 300">
  <defs>
    <style>
      .bg { fill: #050510; rx: 8; stroke: #1c1c38; stroke-width: 2; }
      .header-bg { fill: #1c1c38; rx: 8; }
      .text-head { fill: #f1f5f9; font-family: monospace; font-size: 14px; font-weight: bold; }
      .text-row { fill: #94a3b8; font-family: monospace; font-size: 13px; }
      .text-pass { fill: #00ffcc; font-family: monospace; font-size: 13px; font-weight: bold; }
      .text-warn { fill: #ffea00; font-family: monospace; font-size: 13px; font-weight: bold; }
      
      .cov-bg { fill: #1c1c38; rx: 3; }
      .cov-bar { fill: #00d4ff; rx: 3; stroke-dasharray: 120; stroke-dashoffset: 120; }
      
      .divider { stroke: #1c1c38; stroke-width: 1; }

      /* Animations */
      .row { opacity: 0; animation: fade-in 0.5s forwards; }
      .r1 { animation-delay: 0.3s; }
      .fill1 { animation: fill-bar-1 1s forwards ease-out 0.5s; }
      .r2 { animation-delay: 0.6s; }
      .fill2 { animation: fill-bar-2 1s forwards ease-out 0.8s; }
      .r3 { animation-delay: 0.9s; }
      .fill3 { animation: fill-bar-3 1s forwards ease-out 1.1s; }
      .r4 { animation-delay: 1.2s; }
      .fill4 { animation: fill-bar-4 1s forwards ease-out 1.4s; }
      .r5 { animation-delay: 1.5s; }
      .fill5 { animation: fill-bar-5 1s forwards ease-out 1.7s; }

      @keyframes fade-in { to { opacity: 1; } }
      @keyframes fill-bar-1 { to { stroke-dashoffset: 6; } }
      @keyframes fill-bar-2 { to { stroke-dashoffset: 0; } }
      @keyframes fill-bar-3 { to { stroke-dashoffset: 0; } }
      @keyframes fill-bar-4 { to { stroke-dashoffset: 0; } }
      @keyframes fill-bar-5 { to { stroke-dashoffset: 48; } }
    </style>
  </defs>

  <rect width="850" height="300" class="bg" />
  
  <!-- Header Bar -->
  <rect x="0" y="0" width="850" height="40" class="header-bg" />
  <circle cx="20" cy="20" r="5" fill="#ef4444" />
  <circle cx="40" cy="20" r="5" fill="#eab308" />
  <circle cx="60" cy="20" r="5" fill="#22c55e" />
  <text x="80" y="25" class="text-head">xrun -f run.f -cov -assert | Verification Dashboard</text>
  
  <!-- Table Headers -->
  <text x="30" y="70" class="text-head">IP / SUBSYSTEM</text>
  <text x="280" y="70" class="text-head">METHODOLOGY</text>
  <text x="450" y="70" class="text-head">FUNC. COVERAGE</text>
  <text x="650" y="70" class="text-head">ASSERTIONS</text>
  <text x="760" y="70" class="text-head">STATUS</text>
  
  <path class="divider" d="M 0 85 L 850 85" />
  <!-- Row 1 -->
  <g class="row r1">
    <text x="30" y="115" class="text-row">RV32I 5-Stage Core</text>
    <text x="280" y="115" class="text-row">UVM / Coverage</text>
    <rect x="450" y="105" width="120" height="10" class="cov-bg" />
    <path class="cov-bar fill1" d="M 450 110 L 570 110" stroke-width="10" />
    <text x="580" y="115" class="text-row">95%</text>
    <text x="650" y="115" class="text-row">50/50</text>
    <text x="760" y="115" class="text-pass">PASS</text>
  </g>
  <!-- Row 2 -->
  <g class="row r2">
    <text x="30" y="145" class="text-row">AMBA-APB Timer</text>
    <text x="280" y="145" class="text-row">SVA / Scoreboard</text>
    <rect x="450" y="135" width="120" height="10" class="cov-bg" />
    <path class="cov-bar fill2" d="M 450 140 L 570 140" stroke-width="10" />
    <text x="580" y="145" class="text-row">100%</text>
    <text x="650" y="145" class="text-row">14/14</text>
    <text x="760" y="145" class="text-pass">PASS</text>
  </g>
  <!-- Row 3 -->
  <g class="row r3">
    <text x="30" y="175" class="text-row">UART Controller</text>
    <text x="280" y="175" class="text-row">Directed Tests</text>
    <rect x="450" y="165" width="120" height="10" class="cov-bg" />
    <path class="cov-bar fill3" d="M 450 170 L 570 170" stroke-width="10" />
    <text x="580" y="175" class="text-row">100%</text>
    <text x="650" y="175" class="text-row">15/15</text>
    <text x="760" y="175" class="text-pass">PASS</text>
  </g>
  <!-- Row 4 -->
  <g class="row r4">
    <text x="30" y="205" class="text-row">Sync FIFO</text>
    <text x="280" y="205" class="text-row">Directed Tests</text>
    <rect x="450" y="195" width="120" height="10" class="cov-bg" />
    <path class="cov-bar fill4" d="M 450 200 L 570 200" stroke-width="10" />
    <text x="580" y="205" class="text-row">100%</text>
    <text x="650" y="205" class="text-row">10/10</text>
    <text x="760" y="205" class="text-pass">PASS</text>
  </g>
  <!-- Row 5 -->
  <g class="row r5">
    <text x="30" y="235" class="text-row">MatMul Engine</text>
    <text x="280" y="235" class="text-row">SystemVerilog TB</text>
    <rect x="450" y="225" width="120" height="10" class="cov-bg" />
    <path class="cov-bar fill5" d="M 450 230 L 570 230" stroke-width="10" />
    <text x="580" y="235" class="text-row">60%</text>
    <text x="650" y="235" class="text-row">5/5</text>
    <text x="760" y="235" class="text-warn">WIP</text>
  </g>
</svg>