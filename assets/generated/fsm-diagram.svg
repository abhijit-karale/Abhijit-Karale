<svg width="800" height="380" viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A192F"/>
      <stop offset="100%" stop-color="#0F2138"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8892B0"/>
    </marker>
    <marker id="arrowActive" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64FFDA"/>
    </marker>
    <style>
      .mono{font-family:'Consolas','Courier New',monospace;}
      .title{fill:#64FFDA;font-size:18px;font-weight:bold;}
      .subtitle{fill:#8892B0;font-size:12px;}
      .state-label{fill:#E6F1FF;font-size:13px;font-weight:600;text-anchor:middle;}
      .state-sub{fill:#8892B0;font-size:9px;text-anchor:middle;}
      .edge-label{fill:#8892B0;font-size:10px;font-family:'Consolas','Courier New',monospace;}
      .statebox{fill:#112240;stroke:#233554;stroke-width:2;}
      .edgeline{fill:none;stroke:#233554;stroke-width:1.5;marker-end:url(#arrow);}
    </style>
  </defs>

  <rect width="800" height="380" rx="12" fill="url(#bgGrad2)" stroke="#233554" stroke-width="1"/>

  <text x="30" y="38" class="mono title">MATMUL_ENGINE_FSM.sv</text>
  <text x="30" y="55" class="mono subtitle">sparsity-aware dispatch controller // 6-state Moore machine</text>
  <line x1="24" y1="68" x2="776" y2="68" stroke="#233554" stroke-width="1"/>

  <!-- States laid out roughly in a hexagon -->
  <!-- IDLE top-left, LOAD top-right, DECODE right, COMPUTE bottom-right, DRAIN bottom-left, DONE left -->

  <!-- Edges (drawn first so boxes sit on top) -->
  <path id="e1" class="edgeline" d="M 230,120 L 400,120"/>
  <path id="e2" class="edgeline" d="M 560,140 L 620,190"/>
  <path id="e3" class="edgeline" d="M 620,240 L 560,290"/>
  <path id="e4" class="edgeline" d="M 400,310 L 230,310"/>
  <path id="e5" class="edgeline" d="M 170,290 L 170,140"/>
  <path id="e6" class="edgeline" d="M 480,150 Q 560,215 480,280" stroke-dasharray="4,3"/>

  <!-- Active pulse traveling around the loop -->
  <circle r="6" fill="#64FFDA">
    <animateMotion dur="6s" repeatCount="indefinite"
      path="M 230,120 L 400,120 L 560,140 L 620,190 L 620,240 L 560,290 L 400,310 L 230,310 L 170,290 L 170,140 Z"/>
  </circle>

  <!-- IDLE -->
  <g>
    <rect x="80" y="95" width="150" height="50" rx="8" class="statebox">
      <animate attributeName="stroke" values="#233554;#64FFDA;#233554" dur="6s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="155" y="118" class="mono state-label">IDLE</text>
    <text x="155" y="132" class="mono state-sub">waiting for start</text>
  </g>

  <!-- LOAD -->
  <g>
    <rect x="400" y="95" width="160" height="50" rx="8" class="statebox">
      <animate attributeName="stroke" values="#233554;#64FFDA;#233554" dur="6s" begin="1s" repeatCount="indefinite"/>
    </rect>
    <text x="480" y="118" class="mono state-label">LOAD_WEIGHTS</text>
    <text x="480" y="132" class="mono state-sub">fetch sparse matrix</text>
  </g>

  <!-- DECODE -->
  <g>
    <rect x="600" y="165" width="130" height="50" rx="8" class="statebox">
      <animate attributeName="stroke" values="#233554;#64FFDA;#233554" dur="6s" begin="2s" repeatCount="indefinite"/>
    </rect>
    <text x="665" y="188" class="mono state-label">DECODE</text>
    <text x="665" y="202" class="mono state-sub">index nonzero</text>
  </g>

  <!-- COMPUTE -->
  <g>
    <rect x="600" y="235" width="130" height="50" rx="8" class="statebox">
      <animate attributeName="stroke" values="#233554;#F0B429;#233554" dur="6s" begin="3s" repeatCount="indefinite"/>
    </rect>
    <text x="665" y="258" class="mono state-label">COMPUTE</text>
    <text x="665" y="272" class="mono state-sub">MAC array active</text>
  </g>

  <!-- DRAIN -->
  <g>
    <rect x="400" y="285" width="160" height="50" rx="8" class="statebox">
      <animate attributeName="stroke" values="#233554;#64FFDA;#233554" dur="6s" begin="4s" repeatCount="indefinite"/>
    </rect>
    <text x="480" y="308" class="mono state-label">DRAIN</text>
    <text x="480" y="322" class="mono state-sub">flush pipeline</text>
  </g>

  <!-- DONE -->
  <g>
    <rect x="80" y="285" width="150" height="50" rx="8" class="statebox">
      <animate attributeName="stroke" values="#233554;#64FFDA;#233554" dur="6s" begin="5s" repeatCount="indefinite"/>
    </rect>
    <text x="155" y="308" class="mono state-label">DONE</text>
    <text x="155" y="322" class="mono state-sub">result valid</text>
  </g>

  <!-- Edge labels -->
  <text x="245" y="112" class="mono edge-label">start</text>
  <text x="565" y="160" class="mono edge-label">loaded</text>
  <text x="620" y="230" class="mono edge-label">nz_idx_valid</text>
  <text x="470" y="305" class="mono edge-label">mac_done</text>
  <text x="90" y="215" class="mono edge-label">reset</text>
  <text x="510" y="200" class="mono edge-label">bypass(sparse=0)</text>

  <line x1="24" y1="352" x2="776" y2="352" stroke="#233554" stroke-width="1"/>
  <text x="30" y="368" class="mono subtitle">off-by-one previously found at DECODE-&gt;COMPUTE boundary // fixed and regression-clean</text>
</svg>
